hous_z_management.home:
  path: '/housz-home'
  defaults:
    _controller: '\Drupal\hous_z_management\Controller\HouzDashboardController::home'
    _title: 'Hous-Z · Room Booking System'
  requirements:
    _access: 'TRUE'

hous_z_management.dashboard:
  path: '/housz'
  defaults:
    _controller: '\Drupal\hous_z_management\Controller\HouzDashboardController::dashboard'
    _title: ''
  requirements:
    _permission: 'access houz dashboard'

hous_z_management.bookings:
  path: '/housz/bookings'
  defaults:
    _controller: '\Drupal\hous_z_management\Controller\HouzDashboardController::bookings'
    _title: 'Bookings'
  requirements:
    _permission: 'manage houz bookings'

hous_z_management.settings:
  path: '/housz/settings'
  defaults:
    _form: '\Drupal\hous_z_management\Form\HouzSettingsForm'
    _title: 'Settings'
  requirements:
    _permission: 'administer houz settings'

hous_z_management.booking_action:
  path: '/housz/bookings/{booking_id}/{action}'
  defaults:
    _controller: '\Drupal\hous_z_management\Controller\HouzDashboardController::bookingAction'
    _title: ''
  requirements:
    _permission: 'manage houz bookings'
    action: 'confirm|cancel'
    booking_id: '\d+'

hous_z_management.units:
  path: '/housz/units'
  defaults:
    _controller: '\Drupal\hous_z_management\Controller\HouzDashboardController::units'
    _title: 'Rooms'
  requirements:
    _permission: 'manage houz units'
