beehotel_happening_today.daily_report:
  path: '/admin/beehotel/happening-today'
  defaults:
    _title: 'Happening Today'
    _controller: '\Drupal\beehotel_happening_today\Controller\DailyReportController::dailyReport'
  requirements:
    _permission: 'configure beehotel settings'
