beehotel_happening_today.admin_settings:
  path: '/admin/beehotel/config/services/beehotel-happening-today'
  defaults:
    _form: '\Drupal\beehotel_happening_today\Form\SettingsForm'
    _title: 'BeeHotel Happening Today Settings'
  requirements:
    _permission: 'configure beehotel settings'

